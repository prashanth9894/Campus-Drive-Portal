<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campus Drive — Placement Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />

  <style>
    /* ══ TOKENS ══════════════════════════════════════════ */
    :root {
      --coral:       #ff4d6d;
      --coral-dk:    #e03060;
      --teal:        #00c9b1;
      --teal-dk:     #009e8f;
      --violet:      #7c3aed;
      --violet-lt:   #c4b5fd;
      --sun:         #fbbf24;
      --glass-bg:    rgba(255,255,255,0.22);
      --glass-bg2:   rgba(255,255,255,0.12);
      --glass-bd:    rgba(255,255,255,0.4);
      --glass-sh:    0 8px 40px rgba(100,30,80,0.16);
      --text-hi:     #1a0533;
      --text-md:     #4b2d6b;
      --text-lo:     #9580b0;
      --odd-bg:      rgba(255,255,255,0.24);
      --even-bg:     rgba(255,255,255,0.10);
      --hover-bg:    rgba(255,255,255,0.42);
      --r-lg:        20px;
      --r-sm:        12px;
    }

    /* ══ RESET ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background: #f0e6ff;
      color: var(--text-hi);
    }

    /* ══ ANIMATED BACKGROUND ══════════════════════════════ */
    .bg-scene {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
      background: linear-gradient(135deg, #ffe0ec 0%, #e8d5ff 35%, #ccf5f0 70%, #fff3cc 100%);
    }
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(72px); opacity: 0.6;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .b1 { width:580px; height:580px; background:radial-gradient(circle,#ff4d6d,#ff9eb5); top:-12%; left:-8%;  animation-delay:0s;  }
    .b2 { width:480px; height:480px; background:radial-gradient(circle,#7c3aed,#c4b5fd); top:42%;  right:-8%; animation-delay:-5s; }
    .b3 { width:430px; height:430px; background:radial-gradient(circle,#00c9b1,#7aeee3); bottom:-8%; left:28%; animation-delay:-9s; }
    .b4 { width:280px; height:280px; background:radial-gradient(circle,#fbbf24,#fde68a); top:8%;   right:22%; animation-delay:-3s; }
    @keyframes drift {
      0%   { transform: translate(0,0)    scale(1);    }
      50%  { transform: translate(28px,-18px) scale(1.06); }
      100% { transform: translate(-18px,26px) scale(0.95); }
    }
    .bg-scene::after {
      content:''; position:absolute; inset:0; opacity:.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.05'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ══ LAYOUT ═══════════════════════════════════════════ */
    .wrap { position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:3rem 1.5rem 6rem; }

    /* ══ HEADER ═══════════════════════════════════════════ */
    header { margin-bottom:2.2rem; animation: fadeUp .6s ease both; }
    .hdr-inner {
      background: var(--glass-bg);
      border: 1.5px solid var(--glass-bd);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border-radius: var(--r-lg);
      padding: 1.8rem 2.2rem;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1.4rem;
      box-shadow: var(--glass-sh), 0 1px 0 rgba(255,255,255,.7) inset;
    }
    .hdr-left { display:flex; align-items:center; gap:1.1rem; }
    .logo {
      width:52px; height:52px; flex-shrink:0;
      background: linear-gradient(135deg, var(--coral), var(--violet));
      border-radius:15px; display:grid; place-items:center;
      font-size:1.3rem; box-shadow:0 8px 22px rgba(124,58,237,.35);
    }
    .hdr-text .eyebrow {
      font-family:'Sora',sans-serif; font-size:.62rem; font-weight:700;
      letter-spacing:.2em; text-transform:uppercase; color:var(--coral); margin-bottom:.2rem;
    }
    .hdr-text h1 {
      font-family:'Sora',sans-serif; font-size:clamp(1.45rem,3vw,2.1rem);
      font-weight:800; line-height:1.1; color:var(--text-hi);
    }
    .hdr-text h1 em {
      font-style:normal;
      background:linear-gradient(90deg,var(--coral),var(--violet));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .hdr-stats { display:flex; gap:.7rem; flex-wrap:wrap; }
    .stat-box {
      background:rgba(255,255,255,.6); border:1px solid rgba(255,255,255,.75);
      border-radius:var(--r-sm); padding:.65rem 1.1rem; text-align:center; min-width:72px;
    }
    .stat-box .v {
      font-family:'Sora',sans-serif; font-size:1.5rem; font-weight:800; line-height:1;
      background:linear-gradient(135deg,var(--violet),var(--coral));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .stat-box .l { font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text-lo); margin-top:.2rem; font-weight:600; }

    /* ══ TOOLBAR ══════════════════════════════════════════ */
    .toolbar {
      display:flex; gap:.7rem; margin-bottom:1.4rem;
      flex-wrap:wrap; align-items:center;
      animation: fadeUp .6s .1s ease both;
    }
    .srch { position:relative; flex:1; min-width:210px; }
    .srch-icon { position:absolute; left:.95rem; top:50%; transform:translateY(-50%); font-size:.9rem; color:var(--text-lo); pointer-events:none; }
    input[type=text], select {
      background:rgba(255,255,255,.62); border:1.5px solid rgba(255,255,255,.82);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      color:var(--text-hi); border-radius:var(--r-sm);
      padding:.68rem .9rem .68rem 2.5rem;
      font-family:'Plus Jakarta Sans',sans-serif; font-size:.86rem;
      width:100%; outline:none;
      transition:border-color .2s, background .2s, box-shadow .2s;
      box-shadow:0 2px 10px rgba(124,58,237,.07);
    }
    select { padding-left:.9rem; cursor:pointer; }
    input[type=text]::placeholder { color:var(--text-lo); }
    input[type=text]:focus, select:focus {
      border-color:var(--violet); background:rgba(255,255,255,.88);
      box-shadow:0 0 0 3px rgba(124,58,237,.13);
    }
    .btn {
      font-family:'Sora',sans-serif; font-size:.81rem; font-weight:700;
      border:none; border-radius:var(--r-sm);
      padding:.68rem 1.2rem; cursor:pointer;
      transition:all .22s;
      display:flex; align-items:center; gap:.4rem; white-space:nowrap;
    }
    .btn-add  { background:linear-gradient(135deg,var(--coral),var(--coral-dk)); color:#fff; box-shadow:0 4px 16px rgba(255,77,109,.38); }
    .btn-add:hover  { transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,77,109,.5); }
    .btn-load { background:linear-gradient(135deg,var(--violet),#5b21b6); color:#fff; box-shadow:0 4px 16px rgba(124,58,237,.32); }
    .btn-load:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(124,58,237,.48); }
    .btn-load.loading { opacity:.6; pointer-events:none; }

    /* ══ ADD FORM ═════════════════════════════════════════ */
    .add-card {
      background:rgba(255,255,255,.68); border:1.5px solid rgba(255,255,255,.88);
      backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
      border-radius:var(--r-lg); padding:1.5rem 1.7rem;
      margin-bottom:1.4rem; display:none;
      box-shadow:0 8px 32px rgba(124,58,237,.12);
      animation:slideDown .28s cubic-bezier(.34,1.56,.64,1);
    }
    .add-card.open { display:block; }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-14px) scale(.98); }
      to   { opacity:1; transform:translateY(0)    scale(1);   }
    }
    .form-title {
      font-family:'Sora',sans-serif; font-size:.73rem; font-weight:700;
      letter-spacing:.15em; text-transform:uppercase;
      background:linear-gradient(90deg,var(--coral),var(--violet));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; margin-bottom:.9rem;
    }
    .fgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(185px,1fr)); gap:.7rem; }
    .fgrid input, .fgrid select { padding:.68rem .9rem; }
    .form-acts { display:flex; gap:.6rem; margin-top:.9rem; justify-content:flex-end; }
    .btn-cancel {
      background:transparent; border:1.5px solid rgba(124,58,237,.25);
      color:var(--text-md); border-radius:var(--r-sm);
      font-family:'Sora',sans-serif; font-size:.81rem; font-weight:700;
      padding:.62rem 1.1rem; cursor:pointer; transition:all .2s;
    }
    .btn-cancel:hover { border-color:var(--violet); color:var(--violet); }
    .btn-save {
      background:linear-gradient(135deg,var(--teal),var(--teal-dk)); color:#fff;
      border-radius:var(--r-sm); box-shadow:0 4px 16px rgba(0,201,177,.35);
    }
    .btn-save:hover { transform:translateY(-2px); box-shadow:0 8px 22px rgba(0,201,177,.5); }

    /* ══ TABLE CARD ═══════════════════════════════════════ */
    .table-card {
      background:rgba(255,255,255,.28); border:1.5px solid rgba(255,255,255,.55);
      backdrop-filter:blur(26px); -webkit-backdrop-filter:blur(26px);
      border-radius:var(--r-lg); overflow:hidden;
      box-shadow:0 20px 60px rgba(100,30,100,.15), 0 2px 0 rgba(255,255,255,.65) inset;
      animation: fadeUp .6s .2s ease both;
    }
    .col-hdr {
      display:grid; grid-template-columns:52px 1.6fr 1.2fr 1.1fr 108px 38px;
      padding:.8rem 1.4rem; background:rgba(255,255,255,.52);
      border-bottom:1.5px solid rgba(255,255,255,.62); gap:.5rem;
    }
    .th {
      font-family:'Sora',sans-serif; font-size:.6rem; font-weight:700;
      letter-spacing:.16em; text-transform:uppercase; color:var(--text-lo);
      display:flex; align-items:center; gap:.3rem;
      cursor:pointer; user-select:none; transition:color .2s;
    }
    .th:hover { color:var(--violet); }
    .th.sorted { color:var(--coral); }

    /* ── Rows ── */
    #studentList { list-style:none; }
    .row-item {
      display:grid; grid-template-columns:52px 1.6fr 1.2fr 1.1fr 108px 38px;
      padding:.9rem 1.4rem; border-bottom:1px solid rgba(255,255,255,.35);
      gap:.5rem; align-items:center;
      transition:background .18s;
      animation:rowIn .35s ease both;
      position:relative;
    }
    @keyframes rowIn {
      from { opacity:0; transform:translateX(-16px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .row-item:last-child { border-bottom:none; }

    /* ODD / EVEN */
    .row-item:nth-child(odd)  { background: var(--odd-bg);  }
    .row-item:nth-child(even) { background: var(--even-bg); }
    .row-item:hover            { background: var(--hover-bg) !important; }

    /* left stripe by status */
    .row-item::before {
      content:''; position:absolute; left:0; top:18%; bottom:18%;
      width:3px; border-radius:0 3px 3px 0;
    }
    .row-item.sel::before  { background: var(--teal); }
    .row-item.proc::before { background: var(--violet-lt); }

    /* cells */
    .c-num {
      font-family:'Sora',sans-serif; font-size:.68rem; font-weight:700;
      color:var(--text-lo); background:rgba(124,58,237,.09);
      border-radius:8px; width:30px; height:30px; display:grid; place-items:center;
    }
    .c-name {
      font-family:'Sora',sans-serif; font-weight:600; font-size:.88rem;
      color:var(--text-hi); display:flex; align-items:center; gap:.45rem; flex-wrap:wrap;
    }
    .tag-new {
      font-size:.5rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
      background:linear-gradient(90deg,var(--coral),var(--sun));
      color:#fff; border-radius:5px; padding:2px 6px;
    }
    .c-co   { font-size:.84rem; color:var(--text-md); font-weight:500; }
    .c-role { font-size:.78rem; color:var(--text-lo); font-style:italic; font-weight:300; }
    .badge {
      font-family:'Sora',sans-serif; font-size:.6rem; font-weight:700;
      letter-spacing:.07em; text-transform:uppercase;
      padding:.28rem .72rem; border-radius:100px; display:inline-block;
    }
    .b-sel  { background:rgba(0,201,177,.14); color:#007d70; border:1px solid rgba(0,201,177,.38); }
    .b-proc { background:rgba(124,58,237,.11); color:var(--violet); border:1px solid rgba(124,58,237,.28); }
    .del-btn {
      background:none; border:none; cursor:pointer;
      font-size:.78rem; color:var(--text-lo); opacity:0;
      transition:opacity .2s, color .2s;
      padding:4px; border-radius:6px;
    }
    .row-item:hover .del-btn { opacity:1; }
    .del-btn:hover { color:var(--coral); background:rgba(255,77,109,.1); }

    /* empty state */
    .empty-state {
      padding:3.5rem 1.5rem; text-align:center;
      color:var(--text-lo); font-size:.88rem; font-style:italic;
    }
    .empty-state .ei { font-size:2.4rem; display:block; margin-bottom:.5rem; opacity:.45; }

    /* footer */
    .tbl-foot {
      display:flex; justify-content:space-between; align-items:center;
      padding:.85rem 1.4rem; background:rgba(255,255,255,.52);
      border-top:1.5px solid rgba(255,255,255,.62);
      flex-wrap:wrap; gap:.5rem;
    }
    .cnt { font-family:'Sora',sans-serif; font-size:.68rem; font-weight:600; color:var(--text-lo); }
    .cnt strong { color:var(--violet); }
    .legend { display:flex; gap:1.1rem; }
    .leg-item { display:flex; align-items:center; gap:.38rem; font-size:.68rem; color:var(--text-lo); }
    .dot { width:8px; height:8px; border-radius:50%; }
    .dt { background:var(--teal); }
    .dv { background:var(--violet-lt); }

    /* ══ TOAST ════════════════════════════════════════════ */
    #toast {
      position:fixed; bottom:2rem; right:2rem;
      background:rgba(255,255,255,.9); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border:1.5px solid rgba(255,255,255,.9);
      border-left:4px solid var(--teal);
      border-radius:var(--r-sm); padding:.88rem 1.35rem;
      font-size:.83rem; color:var(--text-hi); font-weight:500;
      box-shadow:0 16px 48px rgba(100,30,100,.16);
      display:flex; align-items:center; gap:.55rem;
      opacity:0; transform:translateY(14px) scale(.97);
      pointer-events:none;
      transition:all .3s cubic-bezier(.34,1.56,.64,1);
      z-index:999; max-width:290px;
    }
    #toast.show { opacity:1; transform:translateY(0) scale(1); }
    .t-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }

    /* ══ MISC ANIMATIONS ══════════════════════════════════ */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ══ RESPONSIVE ═══════════════════════════════════════ */
    @media(max-width:680px) {
      .col-hdr, .row-item { grid-template-columns:40px 1fr 1fr 90px 30px; }
      .col-hdr :nth-child(4), .c-role { display:none; }
    }
    @media(max-width:430px) {
      .col-hdr, .row-item { grid-template-columns:36px 1fr 88px 28px; }
      .col-hdr :nth-child(3), .c-co { display:none; }
    }
  </style>
</head>
<body>

<!-- ── BG ── -->
<div class="bg-scene">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
</div>

<div class="wrap">

  <!-- ── HEADER ── -->
  <header>
    <div class="hdr-inner">
      <div class="hdr-left">
        <div class="logo">🎓</div>
        <div class="hdr-text">
          <p class="eyebrow">✦ Placement Tracker · 2024–25</p>
          <h1>Campus <em>Drive</em> Portal</h1>
        </div>
      </div>
      <div class="hdr-stats">
        <div class="stat-box"><div class="v" id="totalCount">0</div><div class="l">Total</div></div>
        <div class="stat-box"><div class="v" id="selCount">0</div><div class="l">Selected</div></div>
        <div class="stat-box"><div class="v" id="procCount">0</div><div class="l">In Process</div></div>
      </div>
    </div>
  </header>

  <!-- ── TOOLBAR ── -->
  <div class="toolbar">
    <div class="srch">
      <span class="srch-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by name or company…" />
    </div>
    <select id="filterStatus">
      <option value="">All Statuses</option>
      <option value="Selected">Selected</option>
      <option value="In Process">In Process</option>
    </select>
    <button class="btn btn-add" id="toggleFormBtn" onclick="toggleForm()">
      <span id="formIcon">＋</span> Add Student
    </button>
    <button class="btn btn-load" id="fetchBtn" onclick="fetchFromJSON()">
      ⬇ Load More
    </button>
  </div>

  <!-- ── ADD FORM ── -->
  <div class="add-card" id="addCard">
    <div class="form-title">✦ New Student Entry</div>
    <div class="fgrid">
      <input type="text" id="inp-name"    placeholder="Full Name *" />
      <input type="text" id="inp-company" placeholder="Company Name *" />
      <input type="text" id="inp-role"    placeholder="Role / Position" />
      <select id="inp-status">
        <option value="In Process">In Process</option>
        <option value="Selected">Selected</option>
      </select>
    </div>
    <div class="form-acts">
      <button class="btn-cancel" onclick="toggleForm()">Cancel</button>
      <button class="btn btn-save" onclick="addStudent()">✓ Add to List</button>
    </div>
  </div>

  <!-- ── TABLE ── -->
  <div class="table-card">
    <div class="col-hdr">
      <div class="th">#</div>
      <div class="th sorted" id="th-name"    onclick="sortBy('name')">Name ↕</div>
      <div class="th"        id="th-company" onclick="sortBy('company')">Company ↕</div>
      <div class="th"        id="th-role">Role</div>
      <div class="th"        id="th-status"  onclick="sortBy('status')">Status ↕</div>
      <div class="th"></div>
    </div>
    <ul id="studentList">
      <li class="empty-state"><span class="ei">⏳</span>Loading data…</li>
    </ul>
    <div class="tbl-foot">
      <span class="cnt">Showing <strong id="visCount">0</strong> of <strong id="totFoot">0</strong> records</span>
      <div class="legend">
        <div class="leg-item"><div class="dot dt"></div> Selected</div>
        <div class="leg-item"><div class="dot dv"></div> In Process</div>
      </div>
    </div>
  </div>

</div><!-- /wrap -->

<!-- ── TOAST ── -->
<div id="toast">
  <div class="t-dot" id="tDot"></div>
  <span id="toastMsg">Done</span>
</div>

<!-- ══ JAVASCRIPT ════════════════════════════════════════ -->
<script>
  let students = [];
  let sortKey  = 'name';
  let sortDir  = 1;
  let toastTmr;

  const seed = [
    { name:"Aditya Kumar",   company:"IBM",           role:"Cloud Associate",          status:"Selected"   },
    { name:"Sneha Iyer",     company:"Capgemini",     role:"Software Analyst",         status:"Selected"   },
    { name:"Rohan Das",      company:"Tech Mahindra", role:"Junior Developer",         status:"In Process" },
    { name:"Meera Pillai",   company:"Oracle",        role:"Database Trainee",         status:"Selected"   },
    { name:"Vikram Joshi",   company:"Deloitte",      role:"Business Analyst",         status:"In Process" },
    { name:"Kavya Suresh",   company:"Zoho",          role:"Front-End Engineer",       status:"Selected"   },
    { name:"Nikhil Bhatia",  company:"Tata Elxsi",    role:"UI/UX Intern",             status:"In Process" },
  ];

  window.addEventListener('DOMContentLoaded', () => {
    students = seed.map((s,i) => ({ ...s, id: Date.now()+i }));
    render();
    document.getElementById('searchInput').addEventListener('input', render);
    document.getElementById('filterStatus').addEventListener('change', render);
  });

  function render() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const sf = document.getElementById('filterStatus').value;

    let list = students.filter(s =>
      (!q  || s.name.toLowerCase().includes(q) || s.company.toLowerCase().includes(q)) &&
      (!sf || s.status === sf)
    );
    list.sort((a,b) => {
      const va=(a[sortKey]||'').toLowerCase(), vb=(b[sortKey]||'').toLowerCase();
      return va<vb ? -sortDir : va>vb ? sortDir : 0;
    });

    const ul = document.getElementById('studentList');
    ul.innerHTML = '';

    if (!list.length) {
      ul.innerHTML = '<li class="empty-state"><span class="ei">🔍</span>No matching records.</li>';
    } else {
      list.forEach((s,i) => {
        const isSel = s.status === 'Selected';
        const li = document.createElement('li');
        li.className = `row-item ${isSel?'sel':'proc'}`;
        li.style.animationDelay = `${i*38}ms`;
        li.innerHTML = `
          <div class="c-num">${String(i+1).padStart(2,'0')}</div>
          <div class="c-name">${esc(s.name)}${s.isNew?'<span class="tag-new">new</span>':''}</div>
          <div class="c-co">${esc(s.company)}</div>
          <div class="c-role">${esc(s.role||'—')}</div>
          <span class="badge ${isSel?'b-sel':'b-proc'}">${esc(s.status)}</span>
          <button class="del-btn" title="Remove" onclick="removeStudent(${s.id})">✕</button>
        `;
        ul.appendChild(li);
      });
    }

    const sel  = students.filter(s=>s.status==='Selected').length;
    const proc = students.filter(s=>s.status==='In Process').length;
    document.getElementById('totalCount').textContent = students.length;
    document.getElementById('totFoot').textContent    = students.length;
    document.getElementById('selCount').textContent   = sel;
    document.getElementById('procCount').textContent  = proc;
    document.getElementById('visCount').textContent   = list.length;
  }

  function toggleForm() {
    const card = document.getElementById('addCard');
    const open = card.classList.toggle('open');
    document.getElementById('formIcon').textContent = open ? '✕' : '＋';
    if (open) document.getElementById('inp-name').focus();
  }

  function addStudent() {
    const name    = document.getElementById('inp-name').value.trim();
    const company = document.getElementById('inp-company').value.trim();
    const role    = document.getElementById('inp-role').value.trim();
    const status  = document.getElementById('inp-status').value;
    if (!name || !company) { showToast('Please fill in Name & Company!', '#ff4d6d'); return; }
    students.unshift({ id:Date.now(), name, company, role:role||'N/A', status, isNew:true });
    render();
    ['inp-name','inp-company','inp-role'].forEach(id => document.getElementById(id).value='');
    document.getElementById('inp-status').value = 'In Process';
    toggleForm();
    showToast(`${name} added successfully!`, '#00c9b1');
  }

  function removeStudent(id) {
    const s = students.find(x=>x.id===id);
    students = students.filter(x=>x.id!==id);
    render();
    showToast(`${s?.name||'Record'} removed.`, '#7c3aed');
  }

  function sortBy(key) {
    if (sortKey===key) sortDir*=-1; else { sortKey=key; sortDir=1; }
    document.querySelectorAll('.th').forEach(t=>t.classList.remove('sorted'));
    const el = document.getElementById(`th-${key}`);
    if (el) el.classList.add('sorted');
    render();
  }

  async function fetchFromJSON() {
    const btn = document.getElementById('fetchBtn');
    btn.classList.add('loading'); btn.textContent = '⌛ Fetching…';
    try {
      const res = await fetch('./students.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const existing = new Set(students.map(s=>s.name.toLowerCase()));
      const fresh = data.filter(s=>!existing.has(s.name.toLowerCase()));
      if (!fresh.length) {
        showToast('All records already loaded.', '#7c3aed');
      } else {
        fresh.forEach((s,i)=>students.push({...s, id:Date.now()+i, isNew:true}));
        render();
        showToast(`${fresh.length} record${fresh.length>1?'s':''} loaded via AJAX!`, '#00c9b1');
      }
    } catch(err) {
      showToast(`Fetch failed: ${err.message}`, '#ff4d6d');
    } finally {
      btn.classList.remove('loading'); btn.textContent = '⬇ Load More';
    }
  }

  function showToast(msg, color='#00c9b1') {
    document.getElementById('toastMsg').textContent = msg;
    document.getElementById('tDot').style.background = color;
    document.getElementById('toast').style.borderLeftColor = color;
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(toastTmr);
    toastTmr = setTimeout(()=>t.classList.remove('show'), 3200);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
